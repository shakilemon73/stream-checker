kind = "web"
previewPath = "/"
title = "StreamGuard"
version = "1.0.0"
id = "artifacts/streamguard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24438

[services.development]
run = "pnpm --filter @workspace/streamguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streamguard", "run", "build" ]
serve = "static"
publicDir = "artifacts/streamguard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24438"
BASE_PATH = "/"
