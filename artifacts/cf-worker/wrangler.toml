name = "streamguard"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── No Durable Objects, no KV, no Queues — 100% free-tier ────────────────────
# The only binding needed is DATABASE_URL (set as a secret).
# Set it with:  wrangler secret put DATABASE_URL

# ── Local dev ─────────────────────────────────────────────────────────────────
# wrangler picks up .dev.vars automatically; see .dev.vars.example
[dev]
port = 8787

# ── Production ────────────────────────────────────────────────────────────────
# [env.production]
# routes = [{ pattern = "your-domain.com/api/*", zone_name = "your-domain.com" }]
