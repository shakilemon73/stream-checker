openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: StreamGuard API - Batch IPTV stream health checker and playlist manager
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: playlists
    description: Playlist management
  - name: jobs
    description: Check job management
  - name: results
    description: Channel check results
  - name: settings
    description: Application settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Playlists ────────────────────────────────────────────────────────────────
  /playlists:
    get:
      operationId: listPlaylists
      tags: [playlists]
      summary: List all playlists
      responses:
        "200":
          description: List of playlists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playlist"
    post:
      operationId: createPlaylist
      tags: [playlists]
      summary: Create playlist from text, URL, or file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistInput"
      responses:
        "201":
          description: Playlist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /playlists/{id}:
    get:
      operationId: getPlaylist
      tags: [playlists]
      summary: Get playlist details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Playlist details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deletePlaylist
      tags: [playlists]
      summary: Delete a playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /playlists/{id}/channels:
    get:
      operationId: getPlaylistChannels
      tags: [playlists]
      summary: Get channels from a playlist with pagination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: group
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated channel list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelPage"

  # ── Jobs ─────────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all check jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Start a new check job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job status and live stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job and its results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{id}/pause:
    post:
      operationId: pauseJob
      tags: [jobs]
      summary: Pause a running job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/resume:
    post:
      operationId: resumeJob
      tags: [jobs]
      summary: Resume a paused job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a running or paused job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/results:
    get:
      operationId: getJobResults
      tags: [jobs]
      summary: Get check results for a job with filtering/sorting/pagination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortDir
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultPage"

  /jobs/{id}/summary:
    get:
      operationId: getJobSummary
      tags: [jobs]
      summary: Get live stats summary for dashboard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"

  /jobs/{id}/categories:
    get:
      operationId: getJobCategories
      tags: [jobs]
      summary: Get category breakdown with counts for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category list with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /jobs/{id}/probe:
    post:
      operationId: probeChannels
      tags: [jobs]
      summary: Trigger Stage 3 deep ffprobe on selected result IDs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeRequest"
      responses:
        "202":
          description: Probe queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"

  /jobs/{id}/export:
    get:
      operationId: exportJob
      tags: [jobs]
      summary: Export filtered results as M3U, CSV, or JSON
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: format
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            description: Comma-separated status filter e.g. "live,suspicious"
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: File download
          content:
            text/plain:
              schema:
                type: string
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: string

  /jobs/{id}/diff/{compareId}:
    get:
      operationId: diffJobs
      tags: [jobs]
      summary: Compare two jobs of the same playlist - show what changed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: compareId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Diff between two job runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDiff"

  # ── Results ───────────────────────────────────────────────────────────────────
  /results/{id}:
    patch:
      operationId: updateResult
      tags: [results]
      summary: Update channel category or metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultUpdate"
      responses:
        "200":
          description: Updated result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResult"

  # ── Settings ─────────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    ApiMessage:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Playlist schemas ────────────────────────────────────────────────────────
    Playlist:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sourceType:
          type: string
          enum: [text, url, file]
        sourceUrl:
          type: ["string", "null"]
        entryCount:
          type: integer
        duplicatesFound:
          type: integer
        parseWarnings:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, sourceType, entryCount, duplicatesFound, parseWarnings, groups, createdAt]

    PlaylistInput:
      type: object
      properties:
        name:
          type: string
        sourceType:
          type: string
          enum: [text, url, file]
        content:
          type: ["string", "null"]
          description: Raw M3U/M3U8 text (for sourceType=text) or base64 file (for sourceType=file)
        url:
          type: ["string", "null"]
          description: Remote URL to fetch (for sourceType=url)
      required: [name, sourceType]

    Channel:
      type: object
      properties:
        id:
          type: integer
        playlistId:
          type: integer
        tvgId:
          type: ["string", "null"]
        tvgName:
          type: ["string", "null"]
        tvgLogo:
          type: ["string", "null"]
        groupTitle:
          type: ["string", "null"]
        language:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        url:
          type: string
        position:
          type: integer
      required: [id, playlistId, url, position]

    ChannelPage:
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [channels, total, page, limit]

    # ── Job schemas ─────────────────────────────────────────────────────────────
    JobSettings:
      type: object
      properties:
        concurrency:
          type: integer
          default: 30
        timeoutMs:
          type: integer
          default: 8000
        retryCount:
          type: integer
          default: 3
        autoProbe:
          type: boolean
          default: false
        userAgents:
          type: array
          items:
            type: string
      required: []

    Job:
      type: object
      properties:
        id:
          type: integer
        playlistId:
          type: integer
        playlistName:
          type: string
        status:
          type: string
          enum: [queued, running, paused, completed, cancelled, failed]
        settings:
          $ref: "#/components/schemas/JobSettings"
        total:
          type: integer
        checked:
          type: integer
        live:
          type: integer
        dead:
          type: integer
        geoblocked:
          type: integer
        suspicious:
          type: integer
        pending:
          type: integer
        etaSeconds:
          type: ["integer", "null"]
        avgCheckMs:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: ["string", "null"]
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, playlistId, playlistName, status, settings, total, checked, live, dead, geoblocked, suspicious, pending, createdAt]

    JobInput:
      type: object
      properties:
        playlistId:
          type: integer
        settings:
          $ref: "#/components/schemas/JobSettings"
      required: [playlistId]

    JobSummary:
      type: object
      properties:
        jobId:
          type: integer
        status:
          type: string
        total:
          type: integer
        checked:
          type: integer
        live:
          type: integer
        dead:
          type: integer
        geoblocked:
          type: integer
        suspicious:
          type: integer
        pending:
          type: integer
        livePercent:
          type: number
        deadPercent:
          type: number
        avgCheckMs:
          type: ["number", "null"]
        etaSeconds:
          type: ["integer", "null"]
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        progressPercent:
          type: number
      required: [jobId, status, total, checked, live, dead, geoblocked, suspicious, pending, livePercent, deadPercent, progressPercent, topCategories]

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        total:
          type: integer
        live:
          type: integer
        dead:
          type: integer
        geoblocked:
          type: integer
        suspicious:
          type: integer
        pending:
          type: integer
      required: [category, total, live, dead, geoblocked, suspicious, pending]

    JobDiff:
      type: object
      properties:
        jobId:
          type: integer
        compareJobId:
          type: integer
        newlyDead:
          type: array
          items:
            $ref: "#/components/schemas/ChannelResult"
        newlyLive:
          type: array
          items:
            $ref: "#/components/schemas/ChannelResult"
        unchanged:
          type: integer
        summary:
          type: string
      required: [jobId, compareJobId, newlyDead, newlyLive, unchanged, summary]

    # ── Result schemas ──────────────────────────────────────────────────────────
    ProbeData:
      type: object
      properties:
        videoCodec:
          type: ["string", "null"]
        audioCodec:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        framerate:
          type: ["number", "null"]
        bitrate:
          type: ["integer", "null"]
        container:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        mislabeled:
          type: boolean
        mislabelReason:
          type: ["string", "null"]
      required: []

    ChannelResult:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        channelId:
          type: integer
        tvgName:
          type: ["string", "null"]
        tvgLogo:
          type: ["string", "null"]
        url:
          type: string
        category:
          type: ["string", "null"]
        status:
          type: string
          enum: [live, dead, geoblocked, suspicious, pending]
        httpStatus:
          type: ["integer", "null"]
        responseTimeMs:
          type: ["integer", "null"]
        redirectCount:
          type: ["integer", "null"]
        tlsValid:
          type: ["boolean", "null"]
        mimeType:
          type: ["string", "null"]
        manifestValid:
          type: ["boolean", "null"]
        failureReason:
          type: ["string", "null"]
        probeData:
          $ref: "#/components/schemas/ProbeData"
        checkedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, jobId, channelId, url, status]

    ResultPage:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ChannelResult"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [results, total, page, limit]

    ResultUpdate:
      type: object
      properties:
        category:
          type: ["string", "null"]
      required: []

    ProbeRequest:
      type: object
      properties:
        resultIds:
          type: array
          items:
            type: integer
      required: [resultIds]

    # ── Settings schemas ────────────────────────────────────────────────────────
    Settings:
      type: object
      properties:
        defaultConcurrency:
          type: integer
          default: 30
        defaultTimeoutMs:
          type: integer
          default: 8000
        defaultRetryCount:
          type: integer
          default: 3
        maxConcurrency:
          type: integer
          default: 100
        perHostConcurrency:
          type: integer
          default: 10
        autoProbeDefault:
          type: boolean
          default: false
        ffprobePath:
          type: string
          default: ffprobe
      required: [defaultConcurrency, defaultTimeoutMs, defaultRetryCount, maxConcurrency, perHostConcurrency, autoProbeDefault, ffprobePath]

    SettingsInput:
      type: object
      properties:
        defaultConcurrency:
          type: ["integer", "null"]
        defaultTimeoutMs:
          type: ["integer", "null"]
        defaultRetryCount:
          type: ["integer", "null"]
        maxConcurrency:
          type: ["integer", "null"]
        perHostConcurrency:
          type: ["integer", "null"]
        autoProbeDefault:
          type: ["boolean", "null"]
        ffprobePath:
          type: ["string", "null"]
      required: []
