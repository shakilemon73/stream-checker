name: Deploy StreamGuard → Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/cf-worker/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-cf-worker.yml'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Typecheck & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @workspace/cf-worker run typecheck

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: artifacts/cf-worker
          # DATABASE_URL is already stored as a Wrangler secret —
          # no need to pass it here; Cloudflare holds it securely.
